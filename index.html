<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 커스텀 스크롤바 스타일링 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-gray-600 font-medium">데이터를 불러오고 분석하는 중입니다...</p>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <header class="mb-8 border-b pb-5">
            <h1 class="text-3xl font-bold text-gray-900 flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                우리 동네 아파트 실거래가 대시보드
            </h1>
            <p class="mt-2 text-sm text-gray-500">Google Sheets CSV 데이터를 실시간으로 연동하여 분석한 결과입니다.</p>
        </header>

        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- 총 거래 건수 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center">
                <div class="p-3 rounded-full bg-blue-50 text-blue-600 mr-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500">전체 거래 건수</p>
                    <p class="text-2xl font-bold text-gray-900" id="stat-count">-</p>
                </div>
            </div>
            <!-- 평균 거래가 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center">
                <div class="p-3 rounded-full bg-green-50 text-green-600 mr-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500">평균 거래가격</p>
                    <p class="text-2xl font-bold text-gray-900"><span id="stat-avg">-</span><span class="text-sm font-normal text-gray-500 ml-1">만원</span></p>
                </div>
            </div>
            <!-- 최고 거래가 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center">
                <div class="p-3 rounded-full bg-red-50 text-red-600 mr-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500">최고 거래가격</p>
                    <p class="text-2xl font-bold text-gray-900"><span id="stat-max">-</span><span class="text-sm font-normal text-gray-500 ml-1">만원</span></p>
                </div>
            </div>
            <!-- 최저 거래가 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex items-center">
                <div class="p-3 rounded-full bg-indigo-50 text-indigo-600 mr-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6" /></svg>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500">최저 거래가격</p>
                    <p class="text-2xl font-bold text-gray-900"><span id="stat-min">-</span><span class="text-sm font-normal text-gray-500 ml-1">만원</span></p>
                </div>
            </div>
        </div>

        <!-- Chart Section -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-8">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg>
                월별 평균 거래가격 추이 (단위: 만원)
            </h2>
            <div class="relative h-72 w-full">
                <canvas id="monthlyPriceChart"></canvas>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h2 class="text-lg font-bold text-gray-800 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                    상세 거래 목록
                </h2>
                <div class="text-sm text-gray-500">
                    최근 거래일 순 정렬
                </div>
            </div>
            <div class="overflow-x-auto h-96">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50 sticky top-0 z-10 shadow-sm">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">거래일자</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">아파트명</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">법정동</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">전용면적(㎡)</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">층</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">건축년도</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-bold text-blue-600 uppercase tracking-wider">거래금액(만원)</th>
                        </tr>
                    </thead>
                    <tbody id="transactionTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Data rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Footer -->
        <footer class="mt-8 text-center text-sm text-gray-400">
            <p>본 대시보드는 제공된 구글 스프레드시트 데이터를 기반으로 자동 생성되었습니다.</p>
        </footer>
    </div>

    <script>
        // 데이터 소스 URL
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6yN0pKV-izGIt1DQpSP6weojvy2WoxoPC7JuQIOc3nPDp9e9fC86_o5ocuMFPHbGmDkltrScq4VoI/pub?gid=132138607&single=true&output=csv';

        // 숫자 포맷팅 함수 (콤마 추가)
        const formatNumber = (num) => {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        };

        // 데이터 로드 및 초기화
        document.addEventListener('DOMContentLoaded', () => {
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    try {
                        processData(results.data);
                    } catch (error) {
                        console.error("데이터 처리 중 오류 발생:", error);
                        alert("데이터를 처리하는 중 문제가 발생했습니다. 데이터 구조를 확인해주세요.");
                    } finally {
                        // 로딩 오버레이 숨기기
                        document.getElementById('loadingOverlay').style.display = 'none';
                    }
                },
                error: function(error) {
                    console.error("CSV 로드 실패:", error);
                    alert("데이터를 불러오지 못했습니다. URL이나 네트워크 상태를 확인해주세요.");
                    document.getElementById('loadingOverlay').style.display = 'none';
                }
            });
        });

        function processData(rawData) {
            // 1. 데이터 정제 (Data Cleaning)
            const cleanData = rawData.map(row => {
                // 키(Header)가 정확히 일치하지 않을 수 있으므로 공백 제거나 포함 여부로 처리
                const keys = Object.keys(row);
                
                // 각 필드명 찾기 (유연성을 위해 includes 사용)
                const dateKey = keys.find(k => k.includes('거래일자')) || '거래일자';
                const aptKey = keys.find(k => k.includes('아파트명')) || '아파트명';
                const dongKey = keys.find(k => k.includes('법정동')) || '법정동';
                const areaKey = keys.find(k => k.includes('전용면적')) || '전용면적(㎡)';
                const floorKey = keys.find(k => k.includes('층') && !k.includes('건축')) || '층';
                const priceKey = keys.find(k => k.includes('거래금액')) || '거래금액(만원)';
                const yearKey = keys.find(k => k.includes('건축년도')) || '건축년도';

                // 거래금액을 숫자로 변환 (콤마 등 제거)
                const priceStr = String(row[priceKey] || '0').replace(/[^0-9]/g, '');
                const price = parseInt(priceStr, 10) || 0;

                // 거래일자에서 '년-월' 추출 (차트 그룹핑용)
                // 예: "2023-10-15" 또는 "20231015" 등 다양한 포맷 대비
                let dateStr = String(row[dateKey] || '').replace(/[^0-9]/g, '');
                let monthGroup = '알수없음';
                let formattedDate = row[dateKey]; // 표시용 원본

                if (dateStr.length >= 6) {
                    monthGroup = `${dateStr.substring(0, 4)}-${dateStr.substring(4, 6)}`;
                    if (dateStr.length >= 8) {
                        formattedDate = `${dateStr.substring(0, 4)}-${dateStr.substring(4, 6)}-${dateStr.substring(6, 8)}`;
                    }
                }

                return {
                    date: formattedDate,
                    monthGroup: monthGroup,
                    aptName: row[aptKey] || '-',
                    dong: row[dongKey] || '-',
                    area: row[areaKey] || '-',
                    floor: row[floorKey] || '-',
                    year: row[yearKey] || '-',
                    price: price,
                    rawPrice: row[priceKey] || '-'
                };
            }).filter(d => d.price > 0); // 가격 정보가 없는 유효하지 않은 행 필터링

            // 2. 요약 지표 계산 (Metrics)
            if (cleanData.length === 0) return;

            const totalCount = cleanData.length;
            const prices = cleanData.map(d => d.price);
            const maxPrice = Math.max(...prices);
            const minPrice = Math.min(...prices);
            const avgPrice = Math.round(prices.reduce((sum, p) => sum + p, 0) / totalCount);

            // DOM 업데이트
            document.getElementById('stat-count').textContent = formatNumber(totalCount) + '건';
            document.getElementById('stat-avg').textContent = formatNumber(avgPrice);
            document.getElementById('stat-max').textContent = formatNumber(maxPrice);
            document.getElementById('stat-min').textContent = formatNumber(minPrice);

            // 3. 차트 데이터 생성 (월별 그룹핑)
            const monthlyStats = {};
            cleanData.forEach(d => {
                if (!monthlyStats[d.monthGroup]) {
                    monthlyStats[d.monthGroup] = { sum: 0, count: 0 };
                }
                monthlyStats[d.monthGroup].sum += d.price;
                monthlyStats[d.monthGroup].count += 1;
            });

            // 시간순 정렬
            const sortedMonths = Object.keys(monthlyStats).sort();
            const monthlyAvgs = sortedMonths.map(m => Math.round(monthlyStats[m].sum / monthlyStats[m].count));

            renderChart(sortedMonths, monthlyAvgs);

            // 4. 테이블 데이터 렌더링 (최신 날짜순 정렬)
            const sortedDataDesc = [...cleanData].sort((a, b) => b.date.localeCompare(a.date));
            renderTable(sortedDataDesc);
        }

        // 차트 렌더링 함수
        let myChart = null;
        function renderChart(labels, dataPoints) {
            const ctx = document.getElementById('monthlyPriceChart').getContext('2d');
            
            // 기존 차트가 있으면 파괴 (재로드 시 중복 방지)
            if (myChart) {
                myChart.destroy();
            }

            // 그라데이션 색상 생성
            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.5)'); // Tailwind blue-500
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '월별 평균 거래가 (만원)',
                        data: dataPoints,
                        borderColor: '#3b82f6',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#3b82f6',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.3 // 부드러운 곡선
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(17, 24, 39, 0.9)',
                            titleFont: { size: 13, family: 'sans-serif' },
                            bodyFont: { size: 14, weight: 'bold', family: 'sans-serif' },
                            padding: 12,
                            callbacks: {
                                label: function(context) {
                                    return formatNumber(context.parsed.y) + ' 만원';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: { color: '#f3f4f6', drawBorder: false },
                            ticks: {
                                font: { family: 'sans-serif', size: 12 },
                                color: '#6b7280',
                                callback: function(value) {
                                    return formatNumber(value);
                                }
                            }
                        },
                        x: {
                            grid: { display: false, drawBorder: false },
                            ticks: {
                                font: { family: 'sans-serif', size: 12 },
                                color: '#6b7280'
                            }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                }
            });
        }

        // 테이블 렌더링 함수
        function renderTable(data) {
            const tbody = document.getElementById('transactionTableBody');
            tbody.innerHTML = ''; // 초기화

            data.forEach((row, index) => {
                const tr = document.createElement('tr');
                // 짝수/홀수 행 배경색 약간 다르게 (Zebra stripe)
                tr.className = index % 2 === 0 ? 'bg-white hover:bg-gray-50' : 'bg-gray-50/30 hover:bg-gray-50';
                
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${row.date}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${row.aptName}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${row.dong}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-right">${row.area}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-right">${row.floor}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-right">${row.year}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-blue-600 text-right">${formatNumber(row.price)}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
